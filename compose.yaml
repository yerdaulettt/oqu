services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
  
  db:
    image: postgres:17.9-alpine3.23
    container_name: db
    ports:
      - "5433:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 30s
    volumes:
      - pgtestdata:/var/lib/postgresql/data
  
  proxy:
    image: nginx:1.29-alpine
    container_name: proxy
    volumes:
      - type: bind
        source: ./proxy/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  pgtestdata: